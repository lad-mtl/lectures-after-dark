name = "lectures-after-dark"
main = "worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
STRAPI_CONTENT_API_URL = "https://cms.lecturesafterdark.ca/api"
STRAPI_TIMEOUT_MS = "3000"
RESEND_FROM_EMAIL = "Lectures After Dark <contact-form@mail.lecturesafterdark.ca>"
CONTACT_CORE_EMAIL = "core@lecturesafterdark.ca"
CONTACT_MARKETING_EMAIL = "marketing@lecturesafterdark.ca"

[[kv_namespaces]]
binding = "CONTENT_CACHE"
id = "c1817edf009b4a94ab217e3bf4131d4c"

[assets]
directory = "dist"
binding = "ASSETS"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
